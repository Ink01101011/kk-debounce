<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>kk-debounce Video Demo</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        text-align: center;
      }
      input {
        padding: 10px;
        font-size: 1.2em;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <h1>Search Demo</h1>
    <input type="text" id="search" placeholder="Type fast..." />
    <div id="post"></div>
    <script type="module">
      import { debounce } from 'https://cdn.skypack.dev/kk-debounce';
      const postContainer = document.getElementById('post');
      // ปลอม Async Task
      const fetchSomething = async (query, signal) => {
        console.log(`Searching for: ${query}`);
        try {
          // จำลอง Network Request ที่ใช้เวลา 1 วินาที
          const response = await fetch(
            `https://jsonplaceholder.typicode.com/posts/${query}`,
            { signal }
          );
          const data = await response.json();
          postContainer.innerHTML = `<h2>${data.title}</h2><p>${data.body}</p>`;
          console.log(`Finished: ${query}`);
        } catch (e) {
          if (e.name === 'AbortError') console.log(`CANCELED: ${query}`);
        }
      };

      // 🟢 เปิด/ปิด autoAbort ตรงนี้เพื่ออัดวิดีโอ 2 เวอร์ชั่น
      const debouncedFetch = debounce(
        fetchSomething,
        { seconds: 1 },
        { autoAbort: true }
      );

      document.getElementById('search').addEventListener('input', (e) => {
        if (e.target.value.trim() === '') {
          debouncedFetch.cancel();
          return;
        }
        debouncedFetch(e.target.value);
      });
    </script>
  </body>
</html>
